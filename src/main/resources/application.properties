spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:estateiq}
spring.datasource.username=${DB_USERNAME:estateiq}
spring.datasource.password=${DB_PASSWORD:estateiq}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.web.resources.static-locations=file:./frontend/,classpath:/static/

jwt.secret=${JWT_SECRET}
gemini.api.key=${GEMINI_API_KEY:}
